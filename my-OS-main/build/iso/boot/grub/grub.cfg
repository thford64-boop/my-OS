set default=0
set timeout=3

insmod all_video

menuentry "BIG-DOS 1.0" {
    # Added root=/dev/ram0 and rw
    linux   /boot/vmlinuz root=/dev/ram0 rw quiet console=ttyS0 console=tty0 init=/sbin/init
    initrd  /boot/initrd.gz
}

menuentry "BIG-DOS 1.0 (verbose)" {
    linux   /boot/vmlinuz root=/dev/ram0 rw console=ttyS0 console=tty0 init=/sbin/init
    initrd  /boot/initrd.gz
}

menuentry "BIG-DOS GUI mode" {
    linux   /boot/vmlinuz root=/dev/ram0 rw quiet console=tty0 init=/sbin/init BIGDOS_GUI=1
    initrd  /boot/initrd.gz
}